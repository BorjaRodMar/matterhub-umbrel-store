version: "3.7"
services:
  server:
    image: ghcr.io/riddix/home-assistant-matter-hub:latest
    restart: on-failure
    network_mode: host
    stop_grace_period: 1m
    environment:
      - HAMH_HOME_ASSISTANT_URL=http://192.168.7.79:8123/
      - HAMH_HOME_ASSISTANT_ACCESS_TOKEN=${HAMH_TOKEN}
      - HAMH_LOG_LEVEL=info
      - HAMH_HTTP_PORT=8482
      - HAMH_MDNS_NETWORK_INTERFACE=end0
    volumes:
      - ${APP_DATA_DIR}/data:/data
